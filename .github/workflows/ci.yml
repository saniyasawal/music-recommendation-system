name: CI Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3


    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt


    - name: Check FastAPI import
      run: |
        python -c "import api"


    - name: Build Docker image using docker compose
      run: |
        docker compose build


    - name: Run container
      run: |
        docker compose up -d
        sleep 20


    - name: Test FastAPI endpoint
      run: |
        curl http://localhost:8000


    - name: Stop container
      run: |
        docker compose down